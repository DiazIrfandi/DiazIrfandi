name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # Berjalan otomatis setiap tengah malam
  workflow_dispatch: # Memungkinkan trigger manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Menggunakan versi svg-only yang lebih cepat dan ringan
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: DiazIrfandi
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            
      # Melakukan push file SVG yang ter-generate ke branch "output"
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}